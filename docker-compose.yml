services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxeride-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:secret@mongodb:27017/luxeride?authSource=admin}
      - MONGODB_DB=${MONGODB_DB:-luxeride}
      - JWT_SECRET=${JWT_SECRET:-super-secret-development-key-123}
      - NODE_ENV=${NODE_ENV:-development}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@luxeride.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      - mongodb

  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: luxeride-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-secret}
      - MONGO_INITDB_DATABASE=${MONGODB_DB:-luxeride}
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
